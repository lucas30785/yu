name: Atualizar Playlist IPTV

on:
  schedule:
    - cron: "0 * * * *"   # roda todo início de hora
  workflow_dispatch:      # permite rodar manualmente no GitHub

permissions:
  contents: write

jobs:
  run-windows:
    runs-on: windows-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade yt-dlp
      - name: Gerar playlist .m3u
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_ENABLED: true
        run: python gerar_m3u8.py
      - name: Commit e Push
        shell: bash
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add playlist.m3u last_update.txt
          test -f relatorio_ia.md && git add relatorio_ia.md || true
          git commit -m "Playlist IPTV atualizada (Windows) [Bot]" || echo "Nenhuma alteração"
          git push

  run-macos:
    needs: run-windows
    if: failure()
    runs-on: macos-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade yt-dlp
      - name: Gerar playlist .m3u
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_ENABLED: true
        run: python gerar_m3u8.py
      - name: Commit e Push
        shell: bash
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add playlist.m3u last_update.txt
          test -f relatorio_ia.md && git add relatorio_ia.md || true
          git commit -m "Playlist IPTV atualizada (macOS) [Bot]" || echo "Nenhuma alteração"
          git push

  run-ubuntu:
    needs: run-macos
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade yt-dlp
      - name: Gerar playlist .m3u
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_ENABLED: true
        run: python gerar_m3u8.py
      - name: Commit e Push
        shell: bash
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add playlist.m3u last_update.txt
          test -f relatorio_ia.md && git add relatorio_ia.md || true
          git commit -m "Playlist IPTV atualizada (Ubuntu) [Bot]" || echo "Nenhuma alteração"
          git push
