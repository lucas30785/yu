name: Atualizar Playlist IPTV

on:
  schedule:
    - cron: "0 * * * *"   # roda todo início de hora
  workflow_dispatch:      # permite rodar manualmente no GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Gerar playlist .m3u
        run: |
          python gerar_m3u8.py

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add playlist.m3u
          git commit -m "Playlist IPTV atualizada automaticamente [Bot]" || echo "Nenhuma alteração na playlist"
          git push
